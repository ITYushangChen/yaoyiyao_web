<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>摇一摇抽奖</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    .home {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    .home h1 {
      font-family: var(--display);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      margin: 0 0 0.5rem;
      letter-spacing: 0.08em;
    }
    .home p {
      color: var(--muted);
      margin: 0 0 1.5rem;
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 36rem;
    }
    .home-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main class="home">
    <div>
      <h1>摇一摇</h1>
      <p>局域网模式：手机与电脑连接同一 WiFi，扫大屏二维码即可参与。</p>
      <div class="home-actions">
        <a class="btn btn-primary" href="/screen">打开大屏主持</a>
        <a class="btn btn-ghost" href="/preview">手机扫码预览</a>
        <a class="btn btn-ghost" href="/m">手机端入口</a>
      </div>
    </div>
  </main>
</body>
</html>
